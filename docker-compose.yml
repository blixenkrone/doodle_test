name: doodle

services:
  # Postgres dependency. The app waits until this reports healthy.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: doodle
      POSTGRES_PASSWORD: doodle
      POSTGRES_DB: doodle
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doodle -d doodle"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot schema migration. Runs the embedded golang-migrate migrations once
  # Postgres is healthy, then exits; the app waits for it to complete.
  migrate:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./internal/storage/sql/migrations:/migrations:ro
    command:
      [
        "-path=/migrations",
        "-database=postgres://doodle:doodle@postgres:5432/doodle?sslmode=disable",
        "up",
      ]
  pgadmin:
    image: dpage/pgadmin4:9.8
    ports:
      - "5050:80"
    environment:
      # Required by pgAdmin
      PGADMIN_DEFAULT_EMAIL: demo@example.com
      PGADMIN_DEFAULT_PASSWORD: secret

      # Don't require the user to login
      PGADMIN_CONFIG_SERVER_MODE: "False"

      # Don't require a "master" password after logging in
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"

  app:
    build:
      context: .
    image: doodle:local
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: doodle
      ENVIRONMENT: dev
      DATABASE_HOST: postgres
      DATABASE_NAME: doodle
      DATABASE_USERNAME: doodle
      DATABASE_PASSWORD: doodle
      DEBUG: "1"
    ports:
      - "8080:8080"
    # Healthcheck monitor for the /health endpoint.
    healthcheck:
      test:
        ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
