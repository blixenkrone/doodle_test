info:
  contact:
    name: test
  description: Doodle API
  title: API
  version: "1.0"
paths:
  /health:
    get:
      description: Probe verifying that the container has started.
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
      summary: Container Liveness Probe.
      tags:
      - probe
  /ready:
    get:
      description: Probe verifying that the app is fully ready to serve requests.
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/sdk_http.HTTPError'
      summary: Container Readiness Probe.
      tags:
      - probe
  /timeslots:
    post:
      consumes:
      - application/json
      parameters:
      - description: request body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_timeslots.CreateTimeslotRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_timeslots.CreateTimeslotResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
      summary: Create available timeslots
      tags:
      - timeslots
  /timeslots/{id}:
    delete:
      parameters:
      - description: timeslot id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
      summary: Delete a timeslot
      tags:
      - timeslots
    patch:
      consumes:
      - application/json
      parameters:
      - description: timeslot id
        in: path
        name: id
        required: true
        type: string
      - description: request body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_timeslots.UpdateTimeslotRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
      summary: Update a timeslot
      tags:
      - timeslots
  /timeslots/allotted:
    get:
      parameters:
      - description: user id
        in: query
        name: user_id
        required: true
        type: string
      - description: RFC3339 window start
        in: query
        name: date_start
        required: true
        type: string
      - description: RFC3339 window end
        in: query
        name: date_end
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_timeslots.AllottedTimeslot'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
      summary: Get allotted timeslots
      tags:
      - timeslots
  /timeslots/calendar:
    get:
      parameters:
      - description: user id
        in: query
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_timeslots.CalendarMeeting'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
      summary: See personal calendar
      tags:
      - meetings
  /timeslots/meeting:
    post:
      consumes:
      - application/json
      parameters:
      - description: request body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_timeslots.CreateMeetingRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_timeslots.CreateMeetingResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
      summary: Book a meeting on a timeslot
      tags:
      - meetings
  /users:
    post:
      consumes:
      - application/json
      parameters:
      - description: request body
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_onboarding.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_onboarding.CreateUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_blixenkrone_sdk_http.HTTPError'
      summary: Create an User (tenant)
      tags:
      - onboarding
schemes:
- http
swagger: "2.0"
