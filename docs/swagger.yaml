  internal_timeslots.AllottedTimeslot:
    properties:
      duration_mins:
        type: integer
      id:
        type: string
      is_booked:
        type: boolean
      time_end:
        type: string
      time_start:
        type: string
    type: object
  internal_timeslots.Availability:
    properties:
      availability_time_start:
        type: string
      availability_time_to:
        type: string
    type: object
  internal_timeslots.CalendarMeeting:
    properties:
      attendees:
        items:
